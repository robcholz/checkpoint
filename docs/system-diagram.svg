<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
  <title id="title">Checkpoint Hook System Diagram</title>
  <desc id="desc">Minimal stacked system diagram showing five concrete implementations above the profiler wrapper, above the abstract interface, above PyTorch.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6f8fb"/>
      <stop offset="100%" stop-color="#edf4ef"/>
    </linearGradient>
    <linearGradient id="impl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#ffedd5"/>
    </linearGradient>
    <linearGradient id="prof" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ecfeff"/>
      <stop offset="100%" stop-color="#cffafe"/>
    </linearGradient>
    <linearGradient id="iface" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eef2ff"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <linearGradient id="torch" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fee2e2"/>
      <stop offset="100%" stop-color="#fecaca"/>
    </linearGradient>
    <style>
      .title { font: 700 34px 'Helvetica Neue', Arial, sans-serif; fill: #0f172a; }
      .label { font: 700 17px 'Helvetica Neue', Arial, sans-serif; fill: #0f172a; }
      .group-label { font: 700 20px 'Helvetica Neue', Arial, sans-serif; fill: #0f172a; }
      .impl-box { fill: url(#impl); stroke: #fb923c; stroke-width: 2; rx: 18; }
      .prof-box { fill: url(#prof); stroke: #06b6d4; stroke-width: 2; rx: 20; }
      .iface-box { fill: url(#iface); stroke: #6366f1; stroke-width: 2; rx: 20; }
      .torch-box { fill: url(#torch); stroke: #ef4444; stroke-width: 2; rx: 20; }
    </style>
  </defs>

  <rect width="1400" height="900" fill="url(#bg)"/>

  <text x="70" y="70" class="title">Checkpoint Hook System Diagram</text>

  <rect x="70" y="110" width="1260" height="170" class="impl-box"/>
  <text x="585" y="145" class="group-label">Implementations</text>

  <rect x="95" y="170" width="220" height="80" class="impl-box"/>
  <text x="158" y="218" class="label">Baseline</text>

  <rect x="340" y="170" width="220" height="80" class="impl-box"/>
  <text x="415" y="218" class="label">Async</text>

  <rect x="585" y="170" width="220" height="80" class="impl-box"/>
  <text x="650" y="218" class="label">Async-O</text>

  <rect x="830" y="170" width="220" height="80" class="impl-box"/>
  <text x="897" y="218" class="label">GoCkpt</text>

  <rect x="1075" y="170" width="220" height="80" class="impl-box"/>
  <text x="1122" y="218" class="label">GoCkpt-O</text>

  <rect x="410" y="320" width="580" height="90" class="prof-box"/>
  <text x="590" y="374" class="label">PhaseProfilingHook</text>

  <rect x="300" y="450" width="800" height="100" class="iface-box"/>
  <text x="496" y="508" class="label">PyTorchCheckpointHook</text>

  <rect x="450" y="590" width="500" height="90" class="torch-box"/>
  <text x="655" y="644" class="label">PyTorch</text>
</svg>
